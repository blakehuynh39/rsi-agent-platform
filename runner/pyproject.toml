[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "rsi-agent-platform-runner"
version = "0.1.0"
description = "Hermes-backed runner wrapper for RSI Agent Platform"
requires-python = ">=3.11"
dependencies = [
    "hermes-agent[honcho] @ git+https://github.com/NousResearch/hermes-agent.git@0e336b0e717027cbb81fcb5816246b7aec2d4a47",
]

[project.scripts]
rsi-runner = "rsi_runner.main:main"

[tool.setuptools.packages.find]
include = ["rsi_runner"]
