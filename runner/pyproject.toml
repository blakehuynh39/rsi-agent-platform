[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "rsi-agent-platform-runner"
version = "0.1.0"
description = "Hermes-backed runner wrapper for RSI Agent Platform"
requires-python = ">=3.11"
dependencies = [
    "hermes-agent[honcho,mcp] @ git+https://github.com/NousResearch/hermes-agent.git@6f1eed3968318dc1d6ca3fb3ded2de6fc8e50308",
]

[project.scripts]
rsi-runner = "rsi_runner.main:main"

[tool.setuptools.packages.find]
include = ["rsi_runner"]
