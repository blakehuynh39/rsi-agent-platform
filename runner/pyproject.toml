[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "rsi-agent-platform-runner"
version = "0.1.0"
description = "Hermes-backed runner wrapper for RSI Agent Platform"
requires-python = ">=3.11"
dependencies = [
    "hermes-agent[honcho,mcp] @ git+https://github.com/NousResearch/hermes-agent.git@3e61703b08f475c9982cf4099d049eeac232a7a1",
    "PyJWT[crypto]>=2.8,<3",
]

[project.scripts]
rsi-runner = "rsi_runner.main:main"
hermes-skill-exporter = "rsi_runner.hermes_skill_exporter:main"

[tool.setuptools.packages.find]
include = ["rsi_runner"]
