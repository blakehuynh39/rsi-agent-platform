name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      export_only: ${{ steps.changed_paths.outputs.export_only }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: changed_paths
        name: Classify changed paths
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            diff_mode="pr"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            diff_mode="push"
          fi

          if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]]; then
            echo "export_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git cat-file -e "$base^{commit}"; then
            echo "Base commit $base is unavailable; running full validation"
            echo "export_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git cat-file -e "$head^{commit}"; then
            compare="$head"
          else
            echo "Head commit $head is unavailable; falling back to checked out HEAD"
            compare="HEAD"
          fi

          if [ "$diff_mode" = "pr" ]; then
            merge_base="$(git merge-base "$base" "$compare")"
            git diff --name-only "$merge_base" "$compare" > changed-files.txt
          else
            git diff --name-only "$base" "$compare" > changed-files.txt
          fi

          if [ ! -s changed-files.txt ]; then
            echo "export_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if awk 'BEGIN { ok=1 } $0 !~ /^hermes\/exported-skills\// { ok=0 } END { exit ok ? 0 : 1 }' changed-files.txt; then
            echo "export_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "export_only=false" >> "$GITHUB_OUTPUT"
          fi

  validate:
    needs: changes
    if: needs.changes.outputs.export_only != 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: ui/eval-web/pnpm-lock.yaml

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runner package
        run: python -m pip install -e ./runner

      - name: Run repo validation
        run: make ci

      - name: Run Postgres integration tests
        env:
          RSI_TEST_POSTGRES_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres?sslmode=disable
        run: make test-postgres
